<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章阅读 - AI Brief Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --bg-card: #ffffff;
            --fg: #1a1a1a;
            --fg-muted: #666;
            --accent: #2563eb;
            --border: #e5e5e5;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.8;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .nav-inner {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--fg-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-back:hover {
            color: var(--accent);
        }

        .nav-logo {
            margin-left: auto;
            font-weight: 600;
            color: var(--fg);
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* 文章容器 */
        .article-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 1.5rem 6rem;
        }

        /* 文章头部 */
        .article-header {
            margin-bottom: 2.5rem;
        }

        .article-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 100px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .article-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1rem;
            color: var(--fg);
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--fg-muted);
        }

        .article-meta span {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* 特色图片 */
        .article-hero-image {
            width: 100%;
            margin-bottom: 2rem;
            border-radius: 12px;
            overflow: hidden;
        }

        .article-hero-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 文章正文 */
        .article-content {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 1.125rem;
            line-height: 1.9;
            color: #333;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content h2 {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2.5rem 0 1rem;
            color: var(--fg);
        }

        .article-content h3 {
            font-family: 'Inter', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin: 2rem 0 0.75rem;
            color: var(--fg);
        }

        .article-content ul, .article-content ol {
            margin: 1rem 0 1.5rem 1.5rem;
        }

        .article-content li {
            margin-bottom: 0.5rem;
        }

        .article-content blockquote {
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            background: #f0f7ff;
            border-left: 4px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #555;
        }

        .article-content a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .article-content a:hover {
            text-decoration: none;
        }

        /* 文章底部 */
        .article-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .article-source {
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .article-source-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--fg-muted);
            margin-bottom: 0.5rem;
        }

        .article-source-name {
            font-weight: 600;
            color: var(--fg);
        }

        .article-source-url {
            display: block;
            margin-top: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.875rem;
            word-break: break-all;
        }

        .article-source-url:hover {
            text-decoration: underline;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--fg-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误状态 */
        .error {
            text-align: center;
            padding: 4rem 2rem;
        }

        .error h2 {
            margin-bottom: 1rem;
            color: #dc2626;
        }

        .error p {
            color: var(--fg-muted);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .article-title {
                font-size: 1.5rem;
            }

            .article-content {
                font-size: 1rem;
            }

            .article-container {
                padding: 2rem 1rem 4rem;
            }
        }

        /* 深色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --bg-card: #141414;
                --fg: #f5f5f5;
                --fg-muted: #888;
                --border: #262626;
            }

            .article-content {
                color: #e5e5e5;
            }

            .article-content blockquote {
                background: #1a2332;
                color: #ccc;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回首页
            </a>
            <a href="index.html" class="nav-logo">AI Brief Daily</a>
        </div>
    </nav>

    <article class="article-container">
        <div id="articleContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载文章...</p>
            </div>
        </div>
    </article>

    <script>
        const CATEGORY_LABELS = {
            'ai': 'AI 要闻',
            'world': '国际',
            'finance': '财经',
            'llm': '大模型'
        };

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hour = date.getHours().toString().padStart(2, '0');
            const minute = date.getMinutes().toString().padStart(2, '0');
            return `${year}年${month}月${day}日 ${hour}:${minute}`;
        }

        function renderArticle(item) {
            const categoryLabel = CATEGORY_LABELS[item.category] || '资讯';
            
            return `
                <header class="article-header">
                    <span class="article-category">${categoryLabel}</span>
                    <h1 class="article-title">${item.title}</h1>
                    <div class="article-meta">
                        <span>📰 ${item.source}</span>
                        <span>🕐 ${formatTime(item.published_at)}</span>
                    </div>
                </header>
                ${item.image ? `
                <div class="article-hero-image">
                    <img src="${item.image}" alt="${item.title}" loading="lazy">
                </div>
                ` : ''}
                <div class="article-content">
                    ${item.content || item.summary}
                </div>
                <footer class="article-footer">
                    <div class="article-source">
                        <div class="article-source-label">原文来源</div>
                        <div class="article-source-name">${item.source}</div>
                        <a href="${item.url}" class="article-source-url" target="_blank" rel="noopener noreferrer">
                            ${item.url}
                        </a>
                    </div>
                </footer>
            `;
        }

        function renderError() {
            return `
                <div class="error">
                    <h2>😕 文章未找到</h2>
                    <p>抱歉，这篇文章可能已被删除或链接无效。</p>
                    <p style="margin-top: 1rem;"><a href="index.html" style="color: var(--accent);">返回首页</a></p>
                </div>
            `;
        }

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('id');
            
            if (!articleId) {
                document.getElementById('articleContent').innerHTML = renderError();
                return;
            }

            try {
                const response = await fetch('data/news.json');
                const data = await response.json();
                
                // 搜索文章
                let foundItem = null;
                
                // 检查 hero
                if (data.hero && data.hero.id === articleId) {
                    foundItem = { ...data.hero, category: 'ai' };
                }
                
                // 检查各分类
                if (!foundItem && data.categories) {
                    for (const [category, items] of Object.entries(data.categories)) {
                        const item = items.find(i => i.id === articleId);
                        if (item) {
                            foundItem = { ...item, category };
                            break;
                        }
                    }
                }
                
                if (foundItem) {
                    document.getElementById('articleContent').innerHTML = renderArticle(foundItem);
                    document.title = `${foundItem.title} - AI Brief Daily`;
                } else {
                    document.getElementById('articleContent').innerHTML = renderError();
                }
            } catch (err) {
                console.error('加载文章失败:', err);
                document.getElementById('articleContent').innerHTML = renderError();
            }
        }

        loadArticle();
    </script>
</body>
</html>
